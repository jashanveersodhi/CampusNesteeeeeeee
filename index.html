<!DOCTYPE html>
<html>
<head>
  <title>Campus Nest</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>Campus Nest</h1>
    <p>Find affordable stays near your college</p>
  </header>

  <section class="filters">
    <input type="text" placeholder="Search your college">
    
    <select>
      <option>Price</option>
      <option>₹3000–₹6000</option>
      <option>₹6000–₹10000</option>
    </select>

    <select>
      <option>Room Type</option>
      <option>Single</option>
      <option>Shared</option>
    </select>
  </section>

  <section class="grid" id="listings">
    <!-- Cards will come from JS -->
  </section>

  <script src="script.js"></script>
</body>
</html>
